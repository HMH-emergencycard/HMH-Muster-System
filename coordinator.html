<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Muster Coordinator</title>
  <link rel="stylesheet" href="css/muster.css">
</head>
<body>

<div class="header" id="pageHeader">
  <img src="logo.png" alt="HMH Logo" onerror="this.style.display='none'">
  <h1 id="locationTitle">Loading...</h1>
  <div class="count-badge" id="countBadge">0 / 0</div>
</div>
<div class="coordinators" id="coordinatorNames"></div>

<div class="page-coordinator">
  <div class="toolbar">
    <a href="index.html" class="btn btn-back">&larr; Back</a>
    <input type="text" class="search-box" id="searchBox" placeholder="Search name (type 2+ chars to search ALL employees)...">
    <button class="btn btn-primary" id="nfcBtn">&#x1F4F1; Start NFC Scan</button>
    <button class="btn btn-contractor" id="addContractorBtn">&#x1F477; + Contractor</button>
  </div>

  <!-- Contractor form (hidden by default) -->
  <div class="contractor-form" id="contractorForm" style="display:none;">
    <input type="text" id="contractorName" placeholder="Contractor Name" class="contractor-input">
    <input type="text" id="contractorCompany" placeholder="Company" class="contractor-input">
    <button class="btn btn-success" id="contractorSubmit" style="padding:8px 16px;">&#x2705; Check In</button>
    <button class="btn btn-secondary" id="contractorCancel" style="padding:8px 16px;">Cancel</button>
  </div>

  <div class="no-session-banner" id="noSessionBanner" style="display:none">
    &#x26A0;&#xFE0F; No active session. Ask your manager to start a session from the dashboard.
  </div>

  <table class="employee-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="employeeBody"></tbody>
  </table>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="js/app.js"></script>
<script src="js/coordinator.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
