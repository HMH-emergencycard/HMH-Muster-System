<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>HMH Muster - Session History</title>
  <link rel="stylesheet" href="css/muster.css">
</head>
<body>

<div class="header">
  <img src="logo.png" alt="HMH Logo" onerror="this.style.display='none'">
  <h1>HMH &mdash; Session History</h1>
</div>

<div class="page-dashboard">
  <div class="dashboard-summary" style="justify-content:space-between;flex-wrap:wrap;gap:12px;">
    <div>
      <div style="font-size:1.1rem;font-weight:bold;color:#00AEEF;">Past Muster Sessions</div>
      <div class="meta">Click a session to expand per-location details</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <button class="btn btn-danger" id="clearHistoryBtn" style="font-size:0.82rem;padding:7px 14px;">Clear All History</button>
      <a href="dashboard.html" class="btn btn-back">&larr; Back to Dashboard</a>
    </div>
  </div>

  <div id="historyList" style="margin-top:16px;">
    <div style="text-align:center;padding:40px;color:#888;">Loading history&#x2026;</div>
  </div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="js/app.js"></script>
<script src="js/history.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
