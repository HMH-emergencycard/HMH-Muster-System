<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>HMH Muster Dashboard</title>
  <link rel="stylesheet" href="css/muster.css">
</head>
<body>

<!-- PIN Overlay -->
<div id="pin-overlay">
  <div class="pin-box">
    <img src="logo.png" alt="HMH Logo" style="max-width:160px;margin-bottom:16px;" onerror="this.style.display='none'">
    <h2>Manager Access</h2>
    <p>Enter your PIN to view the muster dashboard</p>
    <input type="password" class="pin-input" id="pinInput" maxlength="6" placeholder="&#x2022;&#x2022;&#x2022;&#x2022;" inputmode="numeric">
    <br><br>
    <button class="btn btn-primary" onclick="checkPin()">Enter</button>
    <div class="pin-error" id="pinError">Incorrect PIN. Please try again.</div>
  </div>
</div>

<div class="header">
  <img src="logo.png" alt="HMH Logo" onerror="this.style.display='none'">
  <h1>HMH &mdash; Emergency Muster Dashboard</h1>
  <div class="count-badge" id="overallBadge">0 / 0 Total</div>
</div>

<div class="page-dashboard">
  <div class="dashboard-summary">
    <div>
      <div class="big-count" id="overallCount">0 / 0</div>
      <div>Total Employees Accounted For</div>
    </div>
    <div>
      <span class="active-dot" id="activeDot"></span>
      <span id="sessionStatus">No active session</span>
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <button class="btn btn-success" id="sessionBtn">&#x25B6; Start Session</button>
      <button class="btn btn-primary" id="exportBtn">&#x1F4E5; Export CSV</button>
      <button class="btn btn-warning" id="resetBtn" style="display:none;">&#x1F504; Reset Check-in Data</button>
      <div class="meta" id="lastUpdated"></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <a href="index.html" class="btn btn-back">&larr; Back to Locations</a>
      <a href="history.html" class="btn btn-secondary" style="font-size:0.82rem;padding:7px 14px;">Session History</a>
    </div>
  </div>

  <div class="dashboard-grid" id="dashboardGrid"></div>

  <!-- Contractor Panel (hidden until contractors check in) -->
  <div class="contractor-panel" id="contractorPanel" style="display:none;">
    <div class="contractor-panel-header">&#x1F477; Contractors On-Site</div>
    <div class="contractor-panel-list" id="contractorList"></div>
  </div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="js/app.js"></script>
<script src="js/chat.js"></script>
<script src="js/dashboard.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
