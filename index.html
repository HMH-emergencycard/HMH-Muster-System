<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HMH Muster Check-In</title>
  <link rel="stylesheet" href="css/muster.css">
</head>
<body>

<div class="header">
  <img src="logo.png" alt="HMH Logo" onerror="this.style.display='none'">
  <h1>HMH Emergency Muster Check-In</h1>
</div>

<div class="page-index">
  <h2>Select Your Muster Location</h2>
  <p class="subtitle">Tap your location to open the check-in page</p>
  <div class="location-grid" id="locationGrid"></div>
  <div class="footer-link">
    <a href="dashboard.html">&#x1F4CA; Manager Dashboard &rarr;</a>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="js/app.js"></script>
<script>
  const grid = document.getElementById('locationGrid');
  MUSTER_LOCATIONS.forEach(loc => {
    const card = document.createElement('div');
    card.className = 'location-card';
    card.innerHTML = `
      <h3>${loc.label}${loc.secondShift ? ' <span class="shift-badge">2nd Shift</span>' : ''}</h3>
      <div class="coord-list">${loc.coordinators.join('<br>')}</div>
    `;
    card.addEventListener('click', () => {
      window.location.href = `coordinator.html?location=${encodeURIComponent(loc.id)}`;
    });
    grid.appendChild(card);
  });
</script>
</body>
</html>
